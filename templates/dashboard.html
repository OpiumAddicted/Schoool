<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:type" content="website">
  <meta property="og:title" content="대소마고 대시보드">
  <meta property="og:url" content="https://schooo.site/">
  <meta property="og:description" content="대구소프트웨어마이스터고 11기 전용 대시보드 사이트">
  <meta property="og:site_name" content="대소마고 대시보드">
  <meta property="og:locale" content="ko_KR">
  <title>대소마고 대시보드</title>
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="app-body timetable-page" data-default-timetable-id="{{ defaultTimetableId }}">

  <section id="countdown-window" class="desktop-window countdown-window" aria-label="카운트다운 창">
    <header class="window-titlebar">
      <div class="window-title-left">
        <span class="window-app-icon" aria-hidden="true"></span>
        <h1 class="window-title">카운트다운</h1>
      </div>
      <div class="window-controls">
        <button type="button" class="window-control-btn pip-open-btn" data-pip-target="countdown-window" aria-label="카운트다운 창을 항상 위 창으로 열기">↗️️️️</button>
      </div>
    </header>

    <main class="window-content">
      <section class="clock-wrap" aria-label="현재 시각">
        <p id="current-time" class="clock-digital">00:00:00</p>
      </section>
      <p id="countdown-label" class="info-text">현재 시간을 가져오는 중..</p>
      <p id="countdown-timer" class="timer-text">00분 00초</p>
    </main>
  </section>

  <section id="timetable-window" class="desktop-window timetable-window" aria-label="시간표 창">
    <header class="window-titlebar">
      <div class="window-title-left">
        <span class="window-app-icon" aria-hidden="true"></span>
        <h1 class="window-title">시간표</h1>
      </div>
      <div class="window-controls">
        <button type="button" class="window-control-btn pip-open-btn" data-pip-target="timetable-window" aria-label="시간표 창을 항상 위 창으로 열기">↗️️️️️</button>
      </div>
    </header>

    <main class="window-content">
      {% if timetableOptions %}
      <div class="timetable-toolbar">
        <label for="class-select" class="timetable-select-label">반 선택</label>
        <select id="class-select" class="timetable-select">
          {% for option in timetableOptions %}
          <option
            value="{{ option.url }}"
            data-class-id="{{ option.id }}"
            {% if option.id == defaultTimetableId %}selected{% endif %}
          >
            {{ option.label }}
          </option>
          {% endfor %}
        </select>
      </div>
      {% else %}
      <p class="timetable-empty">시간표 파일을 찾을 수 없습니다.</p>
      {% endif %}
      <div id="timetable-container" class="timetable-container">
        <p>시간표를 불러오는 중..</p>
      </div>
    </main>
  </section>

  <section id="meal-window" class="desktop-window meal-window" aria-label="식단 창">
    <header class="window-titlebar">
      <div class="window-title-left">
        <span class="window-app-icon" aria-hidden="true"></span>
        <h1 class="window-title">{{ mealType }}</h1>
      </div>
      <div class="window-controls">
        <button type="button" class="window-control-btn pip-open-btn" data-pip-target="meal-window" aria-label="식단 창을 항상 위 창으로 열기">↗️️️️️</button>
      </div>
    </header>

    <main class="window-content">
      <p class="meal-text">{{ meal }}</p>
    </main>
  </section>

  <script src="{{ url_for('static', filename='js/timetable.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pip.js') }}"></script>
</body>
</html>
